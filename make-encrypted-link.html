<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Encrypted Link Generator</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7fb;
      color: #1f2937;
      margin: 0;
      padding: 40px 20px;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: 700;
      margin-top: 18px;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      box-sizing: border-box;
    }

    textarea {
      min-height: 150px;
    }

    button {
      margin-top: 18px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover,
    button:focus {
      background: #1d4ed8;
    }

    .note {
      color: #6b7280;
    }
  </style>
</head>

<body>
  <main>
    <h1>Encrypted Google Drive Link Generator</h1>

    <p class="note">
      Paste a Google Drive folder link and choose a passcode. This will generate an encrypted value that you can paste into your public index.html file.
    </p>

    <label for="driveLink">Google Drive Folder Link</label>
    <input id="driveLink" type="url" placeholder="https://drive.google.com/..." />

    <label for="passcode">Passcode</label>
    <input id="passcode" type="password" placeholder="Choose a passcode" />

    <button id="generateButton">Generate encrypted link</button>

    <label for="output">Encrypted URL value</label>
    <textarea id="output" readonly placeholder="Encrypted value will appear here."></textarea>

    <button id="copyButton">Copy encrypted value</button>
  </main>

  <script>
    const generateButton = document.getElementById("generateButton");
    const copyButton = document.getElementById("copyButton");
    const output = document.getElementById("output");

    generateButton.addEventListener("click", async () => {
      const driveLink = document.getElementById("driveLink").value.trim();
      const passcode = document.getElementById("passcode").value;

      if (!driveLink.startsWith("https://")) {
        alert("Please enter a valid Google Drive folder link.");
        return;
      }

      if (passcode.length < 6) {
        alert("Use a passcode with at least 6 characters. Longer is better.");
        return;
      }

      const encryptedValue = await encryptUrl(driveLink, passcode);
      output.value = encryptedValue;
    });

    copyButton.addEventListener("click", async () => {
      if (!output.value) {
        alert("Generate an encrypted value first.");
        return;
      }

      await navigator.clipboard.writeText(output.value);
      alert("Encrypted value copied.");
    });

    async function encryptUrl(url, passcode) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));

      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(passcode),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      const key = await crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: salt,
          iterations: 250000,
          hash: "SHA-256"
        },
        keyMaterial,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["encrypt"]
      );

      const encryptedBuffer = await crypto.subtle.encrypt(
        {
          name: "AES-GCM",
          iv: iv
        },
        key,
        new TextEncoder().encode(url)
      );

      const payload = {
        salt: arrayBufferToBase64(salt),
        iv: arrayBufferToBase64(iv),
        data: arrayBufferToBase64(encryptedBuffer)
      };

      return btoa(JSON.stringify(payload));
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";

      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }

      return btoa(binary);
    }
  </script>
</body>
</html>
